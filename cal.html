<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
</head>
<body style="background-color:white;">
    <div id="root" style="margin-left: 400px; margin-top: 200px;border: 2px solid black;width: fit-content;background-color: black;">

    <div  style="margin: 20px;margin-top: 5px;">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>
    </div>
    <div style="margin: 20px;">
        <button>6</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>0</button>
    </div>
    <div style="margin: 20px;">
        <button>+</button>
        <button>-</button>
        <button>*</button>
        <button>/</button>
        <button>=</button>
    </div>
    </div>
